<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Türkiye - Paraguay Tribün Koordinasyonu</title>

<style>

body{
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

img{
  width:100%;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
}

th{
  background:#d62828;
  color:white;
}

.input-row{
  display:flex;
  align-items:center;
  gap:8px;
}

input{
  width:220px;
  padding:6px;
  font-size:14px;
}

button{
  padding:7px 12px;
  border:none;
  border-radius:4px;
  background:#1976d2;
  color:white;
  cursor:pointer;
}

button.saved{
  background:#2e7d32;
}

@media(max-width:768px){

  input{
    width:140px;
  }

}

</style>
</head>

<body>

<h1>🇹🇷 Türkiye - Paraguay 2026 Tribün Koordinasyonu</h1>

<img src="stadium.jpg">

<br><br>

<table id="tbl">

<thead>
<tr>
<th>Taraf</th>
<th>Blok</th>
<th>Tribün Lideri</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1JM4XQbbnwioyxJgt_7Z79BBJ1bkeuL4",
  authDomain: "turkiye-paraguay-2026.firebaseapp.com",
  projectId: "turkiye-paraguay-2026",
  storageBucket: "turkiye-paraguay-2026.firebasestorage.app",
  messagingSenderId: "1078129476493",
  appId: "1:1078129476493:web:4d08389baa0bfec90973c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const blocks = [
101,102,103,104,105,106,107,108,109,110,111,112,113,114,140,141,142,143,144,145,146,201,202,203,204,205,206,207,208,209,210,211,212,213,214,215,243,244,245,246,301,302,303,304,305,306,307,308,309,310,311,312,313,314,401,402,403,404,405,406,407,408,409,410,411
];

const tbody = document.querySelector("#tbl tbody");

async function loadRows(){

for(const block of blocks){

const ref = doc(db,"leaders",String(block));

const snap = await getDoc(ref);

let leader = "";

if(snap.exists()){
leader = snap.data().name || "";
}

const row = document.createElement("tr");

row.innerHTML = `
<td>${block < 115 ? 'West' : 'East'}</td>
<td>${block}</td>
<td>

<div class="input-row">

<input
id="i${block}"
value="${leader}"
placeholder="İsim giriniz">

<button
id="b${block}"
onclick="saveLeader(${block})">

Kaydet

</button>

</div>

</td>
`;

tbody.appendChild(row);
}

}

window.saveLeader = async function(block){

const name =
document.getElementById("i"+block).value.trim();

if(name === ""){

alert("Lütfen isim giriniz.");

return;

}

await setDoc(
doc(db,"leaders",String(block)),
{
name:name
}
);

const btn =
document.getElementById("b"+block);

btn.innerHTML = "✓";
btn.classList.add("saved");

setTimeout(() => {

btn.innerHTML = "Kaydet";
btn.classList.remove("saved");

},3000);

}

}

loadRows();

</script>

</body>
</html>
