<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Türkiye - Paraguay Tribün Koordinasyonu</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
}
img{
  width:100%;
  border-radius:10px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
}
th{
  background:#d32f2f;
  color:white;
}
input{
  width:95%;
}
button{
  padding:6px 12px;
}
</style>
</head>

<body>

<h1>🇹🇷 Türkiye - Paraguay 2026 Tribün Koordinasyonu</h1>

<img src="stadium.jpg">

<br><br>

<table id="tbl">
<thead>
<tr>
<th>Taraf</th>
<th>Blok</th>
<th>Tribün Lideri</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1JM4XQbbnwioyxJgt_7Z79BBJ1bkeuL4",
  authDomain: "turkiye-paraguay-2026.firebaseapp.com",
  projectId: "turkiye-paraguay-2026",
  storageBucket: "turkiye-paraguay-2026.firebasestorage.app",
  messagingSenderId: "1078129476493",
  appId: "1:1078129476493:web:4d08389baa0bfec90973c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const blocks = [
101,102,103,104,105,
115,116,117,118,119
];

const tbody=document.querySelector("#tbl tbody");

async function loadRows(){

for(const block of blocks){

const ref=doc(db,"leaders",String(block));
const snap=await getDoc(ref);

let leader="";

if(snap.exists()){
leader=snap.data().name || "";
}

const row=document.createElement("tr");

row.innerHTML=`
<td>${block<115?'West':'East'}</td>
<td>${block}</td>
<td>
<input id="i${block}" value="${leader}">
<button onclick="saveLeader(${block})">Kaydet</button>
</td>
`;

tbody.appendChild(row);
}
}

window.saveLeader=async function(block){

const name=document.getElementById("i"+block).value;

await setDoc(
doc(db,"leaders",String(block)),
{
name:name
}
);

alert("Kaydedildi");
}

loadRows();

</script>

</body>
</html>
